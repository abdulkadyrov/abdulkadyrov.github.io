<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лото Онлайн</title>
  <link rel="stylesheet" href="design.css">
</head>
<body>

<h1>Лото Онлайн 🎲</h1>

<div id="number">–</div>
<div id="remaining">Осталось: 90</div>

<div class="controls">
  <button id="drawBtn" onclick="drawNumber()">🎲 Вытянуть номер</button>
  <input id="intervalInput" type="number" min="1" value="2" placeholder="Интервал (сек)">
  <button onclick="toggleAutoDraw()" id="autoBtn">▶ Авто-режим</button>
  <button onclick="showCheatInput()">...</button>
</div>

<div id="cheat-panel" style="display:none;">
  <p>Введите до 15 чисел через запятую:</p>
  <input id="cheat-input" placeholder="например: 12,37,52,88" />
  <br>
  <button onclick="saveCheatNumbers()">Сохранить</button>
</div>

<div id="called">
  <div class="called-title">Выпавшие номера:</div>
  <div class="called-numbers" id="calledList"></div>
</div>

<div id="check-block">
  <h3 style="text-align:center;">Проверить свои 5 чисел</h3>
  <div id="check-inputs">
    <input type="number" min="1" max="90">
    <input type="number" min="1" max="90">
    <input type="number" min="1" max="90">
    <input type="number" min="1" max="90">
    <input type="number" min="1" max="90">
  </div>
  <button onclick="checkNumbers()">Проверить</button>
  <div id="check-results"></div>
</div>

<button id="restart" onclick="restartGame()">🔁 Перезапуск</button>

<script src="move.js"></script>
</body>
</html>
